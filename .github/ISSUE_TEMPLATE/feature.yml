name: Feature Request
description: Propose a new Firefly Narrative capability or workflow improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve?
      placeholder: "When using Firefly Narrative, I struggle with..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work end-to-end?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which areas are affected?
      placeholder: "Frontend (src/), Tauri backend (src-tauri/), scripts/, docs/, CI"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List concrete pass/fail criteria for this feature.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context or screenshots here
    validations:
      required: true
